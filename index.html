<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도토리의 파쿠르 대모험 - 확장판</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .screen {
            display: none;
            background-color: #34495e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 500px;
        }
        .active { display: block; }
        
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
            transition: 0.2s;
        }
        button:hover { background-color: #d35400; }
        .toggle-link {
            color: #bdc3c7;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
            display: inline-block;
        }

        /* 상점 탭 메뉴 스타일 */
        .shop-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            background: #2c3e50;
            padding: 5px;
            border-radius: 8px;
        }
        .shop-tab-btn {
            background-color: transparent;
            margin: 0;
            padding: 8px 12px;
            font-size: 14px;
            flex: 1;
        }
        .shop-tab-btn.active-tab {
            background-color: #3498db;
            border-radius: 4px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .shop-grid::-webkit-scrollbar { width: 6px; }
        .shop-grid::-webkit-scrollbar-thumb { background: #7f8c8d; border-radius: 4px; }
        
        .shop-item {
            background-color: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #7f8c8d;
        }
        .shop-item h4 { margin: 5px 0; font-size: 14px; }
        .shop-item p { margin: 5px 0; font-size: 12px; color: #bdc3c7; }
        .shop-item button { font-size: 13px; padding: 6px 12px; width: 100%; margin: 5px 0 0 0; }

        #game-wrapper {
            display: none;
            position: relative;
            flex-direction: column;
            align-items: center;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #34495e;
            display: block;
            border: 4px solid #ecf0f1;
            border-radius: 8px;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            line-height: 1.5;
        }
        #lobby-btn-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        .lobby-exit-btn {
            background-color: #e74c3c;
            font-size: 14px;
            padding: 8px 15px;
            margin: 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .lobby-exit-btn:hover {
            background-color: #c0392b;
        }
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #bdc3c7;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="screen active">
        <h2>🔐 로그인</h2>
        <input type="text" id="login-id" placeholder="닉네임 입력">
        <input type="password" id="login-pw" placeholder="비밀번호 입력">
        <br>
        <button onclick="handleLogin()">로그인</button>
        <br>
        <span class="toggle-link" onclick="switchScreen('register-screen')">계정이 없으신가요? 회원가입</span>
    </div>

    <!-- 2. 회원가입 화면 -->
    <div id="register-screen" class="screen">
        <h2>📝 회원가입</h2>
        <input type="text" id="reg-id" placeholder="사용할 닉네임 입력">
        <input type="password" id="reg-pw" placeholder="비밀번호 입력">
        <br>
        <button onclick="handleRegister()">가입하기</button>
        <br>
        <span class="toggle-link" onclick="switchScreen('login-screen')">이미 계정이 있습니다. 로그인</span>
    </div>

    <!-- 3. 홈 로비 화면 -->
    <div id="lobby-screen" class="screen">
        <h1 style="margin-top:0;">🐿️ 파쿠르 대모험 로비</h1>
        <p>반갑습니다, <span id="user-nickname" style="color:#f1c40f; font-weight:bold;"></span>님!</p>
        <p>보유 골드: <span id="user-gold" style="color:#f1c40f; font-weight:bold;">0</span> G</p>
        <p style="font-size: 14px; color: #bdc3c7;">
            장착 정보: 
            [얼굴: <span id="user-skin" style="color:#2ecc71;">기본</span>] 
            [다리: <span id="user-leg" style="color:#3498db;">기본</span>] <br>
            [모자: <span id="user-hat" style="color:#e67e22;">기본</span>] 
            [이펙트: <span id="user-effect" style="color:#9b59b6;">기본</span>]
        </p>
        <hr style="border-color:#7f8c8d;">
        <button onclick="startGame()" style="font-size:20px; padding:15px 30px; width:100%;">🎮 게임 시작</button>
        <button onclick="openShop()" style="font-size:18px; width:100%; margin-top:10px; background-color:#3498db;">🛒 커스텀 상점 가기</button>
        <button onclick="logout()" style="font-size:14px; width:100%; margin-top:10px; background-color:#95a5a6;">로그아웃</button>
    </div>

    <!-- 4. 상점 화면 -->
    <div id="shop-screen" class="screen">
        <h2>🛒 캐릭터 커스텀 상점</h2>
        <p>나의 골드: <span class="current-gold" style="color:#f1c40f; font-weight:bold;">0</span> G</p>
        
        <!-- 상점 카테고리 탭 -->
        <div class="shop-tabs">
            <button class="shop-tab-btn active-tab" id="tab-face" onclick="changeShopTab('face')">👤 얼굴(스킨)</button>
            <button class="shop-tab-btn" id="tab-legs" onclick="changeShopTab('legs')">🦿 다리</button>
            <button class="shop-tab-btn" id="tab-hats" onclick="changeShopTab('hats')">⛑️ 모자</button>
            <button class="shop-tab-btn" id="tab-effects" onclick="changeShopTab('effects')">✨ 이펙트</button>
        </div>

        <!-- 아이템들이 동적으로 로드되는 그리드 -->
        <div class="shop-grid" id="shop-items-container"></div>
        
        <hr style="border-color:#7f8c8d; margin-top:20px;">
        <button onclick="switchScreen('lobby-screen')" style="background-color:#7f8c8d;">로비로 돌아가기</button>
    </div>

    <!-- 5. 게임 플레이 화면 -->
    <div id="game-wrapper">
        <h2 style="margin:5px 0;">🐿️ 도토리의 파쿠르 대모험 🌳</h2>
        <div id="game-container">
            <div id="lobby-btn-container">
                <button class="lobby-exit-btn" onclick="exitToLobby()">🏠 홈화면으로</button>
            </div>
            <div id="ui">
                Stage: <span id="stage-num">1</span>/10<br>
                Deaths: <span id="death-num">0</span><br>
                Gold: <span id="ingame-gold">0</span> G
            </div>
            <canvas id="gameCanvas" width="800" height="500"></canvas>
        </div>
        <div id="instructions">
            <strong>조작법:</strong> 좌우 방향키(←, →) 또는 A, D - 이동 | 위 방향키(↑) 또는 W, Space - 점프
        </div>
    </div>

<script>
let currentUser = null;
let userData = {};
let currentShopTab = 'face'; // 기본 탭은 얼굴

// 전체 아이템 정의 스펙 및 이름 정보
const allItemsData = {
    face: {
        default: { name: '기본 도토리', price: 0 },
        chestnut: { name: '밤톨이', price: 150 },
        trophy: { name: '빅토리 (트로피)', price: 150 },
        potato: { name: '감자도리', price: 150 },
        tiger: { name: '산중호걸 (호랑이)', price: 150 },
        takoyaki: { name: '타코야끼', price: 150 },
        baseball: { name: '이성연 (야구공)', price: 150 },
        heart: { name: '한승민&배주아', price: 150 },
        duck: { name: '곽여진 (오리)', price: 150 },
        question: { name: '백서준 (물음표)', price: 150 }
    },
    legs: {
        default: { name: '기본 다리', price: 0 },
        wood: { name: '나무 다리', price: 100 },
        tigerLeg: { name: '호랑이 다리', price: 100 },
        duckLeg: { name: '오리 다리', price: 120 },
        toothpick: { name: '이쑤시개', price: 100 }
    },
    hats: {
        default: { name: '기본 (없음)', price: 0 },
        shell: { name: '밤 껍질 (가시)', price: 120 },
        baseballCap: { name: '야구모자', price: 120 },
        partyCap: { name: '생일모자', price: 120 },
        katsuobushi: { name: '가쓰오부시', price: 120 },
        angelRing: { name: '천사 링', price: 150 }
    },
    effects: {
        default: { name: '기본 (없음)', price: 0 },
        spikeEff: { name: '가시 이펙트', price: 130 },
        sproutEff: { name: '새싹 이펙트', price: 130 },
        teriyakiEff: { name: '데리야끼 소스', price: 130 },
        runEff: { name: '달리기 이펙트', price: 130 },
        duckFootEff: { name: '오리 발자국', price: 130 },
        heartEff: { name: '하트 이펙트', price: 150 }
    }
};

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('game-wrapper').style.display = 'none';
    
    if(screenId === 'game') {
        document.getElementById('game-wrapper').style.display = 'flex';
    } else {
        document.getElementById(screenId).classList.add('active');
    }
}

function handleRegister() {
    const id = document.getElementById('reg-id').value.trim();
    const pw = document.getElementById('reg-pw').value.trim();
    if(!id || !pw) return alert("닉네임과 비밀번호를 입력해주세요.");
    if(localStorage.getItem('user_' + id)) return alert("이미 존재하는 닉네임입니다.");
    
    const newUserData = {
        id: id, pw: pw, gold: 0,
        currentSkin: 'default', currentLeg: 'default', currentHat: 'default', currentEffect: 'default',
        unlockedSkins: ['default'], unlockedLegs: ['default'], unlockedHats: ['default'], unlockedEffects: ['default']
    };
    localStorage.setItem('user_' + id, JSON.stringify(newUserData));
    alert("회원가입 완료! 로그인 해주세요.");
    switchScreen('login-screen');
}

function handleLogin() {
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-pw').value.trim();
    const stored = localStorage.getItem('user_' + id);
    if(!stored) return alert("존재하지 않는 닉네임입니다.");
    
    const user = JSON.parse(stored);
    if(user.pw !== pw) return alert("비밀번호가 일치하지 않습니다.");
    
    currentUser = id;
    userData = user;
    
    // 이전 하위 호환 구조 체크 및 보정
    if(!userData.currentLeg) { userData.currentLeg = 'default'; userData.unlockedLegs = ['default']; }
    if(!userData.currentHat) { userData.currentHat = 'default'; userData.unlockedHats = ['default']; }
    if(!userData.currentEffect) { userData.currentEffect = 'default'; userData.unlockedEffects = ['default']; }

    updateLobbyUI();
    switchScreen('lobby-screen');
}

function logout() {
    currentUser = null; userData = {};
    document.getElementById('login-id').value = '';
    document.getElementById('login-pw').value = '';
    switchScreen('login-screen');
}

function updateLobbyUI() {
    document.getElementById('user-nickname').innerText = userData.id;
    document.getElementById('user-gold').innerText = userData.gold;
    
    document.getElementById('user-skin').innerText = allItemsData.face[userData.currentSkin]?.name || '기본';
    document.getElementById('user-leg').innerText = allItemsData.legs[userData.currentLeg]?.name || '기본';
    document.getElementById('user-hat').innerText = allItemsData.hats[userData.currentHat]?.name || '기본';
    document.getElementById('user-effect').innerText = allItemsData.effects[userData.currentEffect]?.name || '기본';
    
    document.querySelectorAll('.current-gold').forEach(e => e.innerText = userData.gold);
}

function saveUserData() {
    if(currentUser) {
        localStorage.setItem('user_' + currentUser, JSON.stringify(userData));
    }
}

// 상점 카테고리 전환 핸들러
function changeShopTab(tabName) {
    currentShopTab = tabName;
    document.querySelectorAll('.shop-tab-btn').forEach(btn => btn.classList.remove('active-tab'));
    if(tabName === 'face') document.getElementById('tab-face').classList.add('active-tab');
    if(tabName === 'legs') document.getElementById('tab-legs').classList.add('active-tab');
    if(tabName === 'hats') document.getElementById('tab-hats').classList.add('active-tab');
    if(tabName === 'effects') document.getElementById('tab-effects').classList.add('active-tab');
    updateShopUI();
}

function openShop() {
    changeShopTab('face');
    switchScreen('shop-screen');
}

// 카테고리 기반 상점 그리드 동적 렌더링
function updateShopUI() {
    updateLobbyUI();
    const container = document.getElementById('shop-items-container');
    container.innerHTML = ''; // 초기화

    const items = allItemsData[currentShopTab];
    
    // 해당 카테고리에 유저가 매핑중인 데이터 확인 키 세팅
    let currentEquipped = '';
    let unlockedList = [];
    if(currentShopTab === 'face') { currentEquipped = userData.currentSkin; unlockedList = userData.unlockedSkins; }
    if(currentShopTab === 'legs') { currentEquipped = userData.currentLeg; unlockedList = userData.unlockedLegs; }
    if(currentShopTab === 'hats') { currentEquipped = userData.currentHat; unlockedList = userData.unlockedHats; }
    if(currentShopTab === 'effects') { currentEquipped = userData.currentEffect; unlockedList = userData.unlockedEffects; }

    Object.keys(items).forEach(key => {
        const item = items[key];
        const isUnlocked = unlockedList.includes(key);
        const isEquipped = currentEquipped === key;
        
        const itemBox = document.createElement('div');
        itemBox.className = 'shop-item';
        
        let btnText = `구매 (${item.price}G)`;
        let btnStyle = "background-color: #e67e22;";
        if(isUnlocked) {
            btnText = isEquipped ? "장착됨" : "장착하기";
            btnStyle = isEquipped ? "background-color: #2ecc71;" : "background-color: #3498db;";
        }

        itemBox.innerHTML = `
            <h4>${item.name}</h4>
            <p>${isUnlocked ? '보유중' : '가격: ' + item.price + 'G'}</p>
            <button style="${btnStyle}" onclick="buyOrEquipCustom('${currentShopTab}', '${key}')">${btnText}</button>
        `;
        container.appendChild(itemBox);
    });
}

// 상점 구매 및 장착 비즈니스 로직 확장
function buyOrEquipCustom(category, key) {
    const item = allItemsData[category][key];
    
    let currentEquipped = '';
    let unlockedList = [];
    if(category === 'face') { currentEquipped = userData.currentSkin; unlockedList = userData.unlockedSkins; }
    if(category === 'legs') { currentEquipped = userData.currentLeg; unlockedList = userData.unlockedLegs; }
    if(category === 'hats') { currentEquipped = userData.currentHat; unlockedList = userData.unlockedHats; }
    if(category === 'effects') { currentEquipped = userData.currentEffect; unlockedList = userData.unlockedEffects; }

    if(unlockedList.includes(key)) {
        // 바로 장착
        if(category === 'face') userData.currentSkin = key;
        if(category === 'legs') userData.currentLeg = key;
        if(category === 'hats') userData.currentHat = key;
        if(category === 'effects') userData.currentEffect = key;
        saveUserData();
        updateShopUI();
    } else {
        // 구매 진행
        if(userData.gold >= item.price) {
            userData.gold -= item.price;
            unlockedList.push(key);
            
            if(category === 'face') userData.currentSkin = key;
            if(category === 'legs') userData.currentLeg = key;
            if(category === 'hats') userData.currentHat = key;
            if(category === 'effects') userData.currentEffect = key;
            
            saveUserData();
            alert(`${item.name} 파츠를 구매하고 장착했습니다!`);
            updateShopUI();
        } else {
            alert("골드가 부족합니다! 스테이지를 완주해서 보상을 얻으세요.");
        }
    }
}


// --- 게임 플레이 엔진 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let currentStage = 1;
let deaths = 0;
let gameLoopId = null;

// 실시간 잔상(이펙트) 목록 보관용 배열
let effectsList = [];

const player = {
    x: 50, y: 350,
    width: 24, height: 36,
    vx: 0, vy: 0,
    speed: 5, jumpForce: 12.5,   
    baseSpeed: 5, baseJump: 12.5,
    grounded: false, facing: 1
};

const gravity = 0.48;
const friction = 0.85;
const keys = {};

window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if(e.key === 'Escape' && gameLoopId) exitToLobby();
});
window.addEventListener('keyup', e => keys[e.key] = false);

function exitToLobby() {
    if(gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
    updateLobbyUI();
    switchScreen('lobby-screen');
}

    1: { playerStart: {x: 50, y: 350}, blocks: [{x: 0, y: 450, w: 800, h: 50, type: 1}, {x: 300, y: 350, w: 120, h: 100, type: 1}, {x: 520, y: 250, w: 120, h: 200, type: 1}, {x: 730, y: 150, w: 50, h: 300, type: 6}, {x: 50, y: 300, type: 7, text: "기본 이동: 방향키 또는 WASD / Space"}, {x: 720, y: 110, type: 7, text: "GOAL!"}] },
    2: { playerStart: {x: 50, y: 350}, blocks: [{x: 0, y: 450, w: 200, h: 50, type: 1}, {x: 200, y: 450, w: 150, h: 50, type: 2}, {x: 350, y: 450, w: 450, h: 50, type: 1}, {x: 730, y: 350, w: 50, h: 100, type: 6}, {x: 210, y: 380, type: 7, text: "⚠️ 가시 블록: 닿으면 즉사! 뛰어넘으세요."}] },
    3: { playerStart: {x: 50, y: 350}, blocks: [{x: 0, y: 450, w: 150, h: 50, type: 1}, {x: 200, y: 450, w: 80, h: 50, type: 3}, {x: 380, y: 230, w: 150, h: 270, type: 1}, {x: 650, y: 150, w: 120, h: 350, type: 1}, {x: 700, y: 50, w: 50, h: 100, type: 6}, {x: 180, y: 380, type: 7, text: "🚀 점프대: 밟으면 엄청 높게 점프합니다!"}] },

        ctx.fillStyle = '#d35400'; ctx.fillRect(-w/2, -h/2 + 16, w, 10);

    } else if (skin === 'potato') {

        ctx.fillStyle = '#f4d03f'; ctx.beginPath(); ctx.arc(2, -h/2 + 14, 7, 0, Math.PI*2); ctx.fill();

    } else if (hat === 'baseballCap') {

        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(-w/3, -h/2 + 3); ctx.lineTo(0, -h/2 - 16); ctx.lineTo(w/3, -h/2 + 3); ctx.closePath(); ctx.fill();

    // 3. 다리 파츠 그리기 (이동 애니메이션 결합)
    const bodyBottomY = -h/2 + 26;
    let leftLegX = -4, rightLegX = 4;
    let legYOffset = h/2;

    let swing = 0;
    if (Math.abs(player.vx) > 0.5 && player.grounded) {
        swing = Math.sin(Date.now() * 0.015) * 6;
    }

    ctx.save();
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';

    if (leg === 'default') {
        ctx.strokeStyle = '#000000';
        ctx.beginPath(); ctx.moveTo(leftLegX, bodyBottomY); ctx.lineTo(leftLegX - 2 + swing, legYOffset); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightLegX, bodyBottomY); ctx.lineTo(rightLegX + 2 - swing, legYOffset); ctx.stroke();
    } else if (leg === 'wood') {
        ctx.strokeStyle = '#8b5a2b'; ctx.lineWidth = 5; // 단단한 나무느낌
        ctx.beginPath(); ctx.moveTo(leftLegX, bodyBottomY); ctx.lineTo(leftLegX + swing, legYOffset); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightLegX, bodyBottomY); ctx.lineTo(rightLegX - swing, legYOffset); ctx.stroke();
    } else if (leg === 'tigerLeg') {
        ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(leftLegX, bodyBottomY); ctx.lineTo(leftLegX + swing, legYOffset); ctx.stroke();

        ctx.beginPath(); ctx.moveTo(rightLegX, bodyBottomY); ctx.lineTo(rightLegX - swing, legYOffset - 2); ctx.stroke();
        ctx.fillRect(rightLegX - swing - 3, legYOffset - 2, 6, 3);
    } else if (leg === 'toothpick') {
        ctx.strokeStyle = '#f5f5dc'; ctx.lineWidth = 1.5; // 매우 얇은 가시 다리
        ctx.beginPath(); ctx.moveTo(leftLegX, bodyBottomY); ctx.lineTo(leftLegX + swing, legYOffset); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightLegX, bodyBottomY); ctx.lineTo(rightLegX - swing, legYOffset); ctx.stroke();

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.w &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.h &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    // 실시간 캐릭터 잔상 이펙트 스폰 로직 (움직임이 감지될 때)
    if ((Math.abs(player.vx) > 0.2 || Math.abs(player.vy) > 0.2) && userData.currentEffect !== 'default') {
        // 프레임 부하를 줄이기 위해 소량의 난수 주기로 생성
        if (Math.random() < 0.35) {
            effectsList.push({
                x: player.x + player.width / 2,
                y: player.y + player.height - 4,
                type: userData.currentEffect,
                spawnTime: Date.now()
            });
        }
    }

    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.vx = player.speed; player.facing = 1;
    } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.vx = -player.speed; player.facing = -1;
    } else {
        player.vx *= friction;
    }

    if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && player.grounded) {
        player.vy = -player.jumpForce; player.grounded = false;
    }

    player.vy += gravity;
    player.speed = player.baseSpeed;
    player.jumpForce = player.baseJump;

    player.x += player.vx;
    const stage = stages[currentStage];
    
    for (let block of stage.blocks) {
        if (block.type === 7) continue;
        if (checkCollision(player, block)) {
            if (block.type === 2) { handleDeath(); return; }
            if (block.type === 6) { nextStage(); return; }
            if (player.vx > 0) player.x = block.x - player.width;
            if (player.vx < 0) player.x = block.x + block.w;
        }
    }

    player.y += player.vy;
    player.grounded = false;

    for (let block of stage.blocks) {
        if (block.type === 7) continue;
        if (checkCollision(player, block)) {
            if (block.type === 2) { handleDeath(); return; }
            if (block.type === 6) { nextStage(); return; }
            
            if (player.vy > 0) { 
                player.y = block.y - player.height; player.vy = 0; player.grounded = true;
                
                if (block.type === 3) { player.vy = -player.baseJump * 1.55; player.grounded = false; }
                if (block.type === 4) { player.speed = player.baseSpeed * 1.8; }
                if (block.type === 5) { 
                    player.speed = player.baseSpeed * 0.45; 
                    player.jumpForce = player.baseJump * 0.80; 
                }
            } else if (player.vy < 0) { 
                player.y = block.y + block.h; player.vy = 0;
            }
        }
    }

    if (player.y > canvas.height) handleDeath();

    // 0.5초 경과한 소멸 대상 이펙트 필터링 처리 ($500\text{ms}$)
    const now = Date.now();
    effectsList = effectsList.filter(eff => now - eff.spawnTime < 500);
}

function handleDeath() {
    deaths++;
    effectsList = [];
    updateInGameUI();
    resetPlayer();
}

function nextStage() {
    currentStage++;
    effectsList = [];
    if (currentStage > 10) {
        userData.gold += 100;
        saveUserData();
        alert(`🎉 축하합니다! 마지막 10스테이지까지 모두 클리어하셨습니다!\n🎁 최종 클리어 보상 100G 획득!\n총 데스 수: ${deaths}`);
        exitToLobby();
    } else {
        updateInGameUI();
        resetPlayer();
    }
}

// 지나간 자리에 남는 실시간 이펙트 렌더링 시스템
function drawEffects() {
    const now = Date.now();
    effectsList.forEach(eff => {
        const elapsed = now - eff.spawnTime;
        const opacity = Math.max(0, 1 - (elapsed / 500)); // 시간에 따라 서서히 투명화
        
        ctx.save();
        ctx.globalAlpha = opacity;

        if (eff.type === 'spikeEff') {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.moveTo(eff.x - 5, eff.y); ctx.lineTo(eff.x, eff.y - 8); ctx.lineTo(eff.x + 5, eff.y); ctx.fill();
        } else if (eff.type === 'sproutEff') {
            ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.quadraticCurveTo(eff.x + 4, eff.y - 6, eff.x + 6, eff.y - 8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.quadraticCurveTo(eff.x - 4, eff.y - 6, eff.x - 6, eff.y - 8); ctx.stroke();
        } else if (eff.type === 'teriyakiEff') {
            ctx.fillStyle = '#4a2711';
            ctx.beginPath(); ctx.arc(eff.x, eff.y - 2, 4, 0, Math.PI * 2); ctx.fill();
        } else if (eff.type === 'runEff') {
            ctx.fillStyle = '#ecf0f1';
            ctx.beginPath(); ctx.arc(eff.x - 4, eff.y - 2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(eff.x + 2, eff.y - 4, 2, 0, Math.PI * 2); ctx.fill();
        } else if (eff.type === 'duckFootEff') {
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(eff.x - 3, eff.y - 2, 6, 3);
        } else if (eff.type === 'heartEff') {
            ctx.fillStyle = '#ff4757';
            ctx.font = '12px sans-serif';
            ctx.fillText("♥", eff.x - 5, eff.y - 2);
        }

        ctx.restore();
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const stage = stages[currentStage];

    // 블록 그리기
    for (let block of stage.blocks) {
        switch(block.type) {
            case 1: ctx.fillStyle = '#8d6e63'; ctx.fillRect(block.x, block.y, block.w, block.h); ctx.strokeStyle = '#5d4037'; ctx.strokeRect(block.x, block.y, block.w, block.h); break;
            case 2: ctx.fillStyle = '#e74c3c'; ctx.beginPath(); for (let i = block.x; i < block.x + block.w; i += 10) { ctx.moveTo(i, block.y + block.h); ctx.lineTo(i + 5, block.y); ctx.lineTo(i + 10, block.y + block.h); } ctx.fill(); break;
            case 3: ctx.fillStyle = '#2ecc71'; ctx.fillRect(block.x, block.y, block.w, block.h); ctx.fillStyle = '#27ae60'; ctx.fillRect(block.x, block.y, block.w, 6); break;
            case 4: ctx.fillStyle = '#f1c40f'; ctx.fillRect(block.x, block.y, block.w, block.h); ctx.fillStyle = '#d68910'; ctx.font = '10px sans-serif'; for(let k = block.x + 2; k < block.x + block.w; k += 20) { ctx.fillText(">>", k, block.y + 14); } break;
            case 5: ctx.fillStyle = '#9b59b6'; ctx.fillRect(block.x, block.y, block.w, block.h); ctx.fillStyle = '#7d3c98'; ctx.fillRect(block.x, block.y, block.w, 4); break;
            case 6: ctx.fillStyle = '#f1c40f'; ctx.fillRect(block.x, block.y, block.w, block.h); ctx.strokeStyle = '#ffffff'; ctx.strokeRect(block.x + 4, block.y + 4, block.w - 8, block.h - 4); break;
            case 7: ctx.fillStyle = '#ecf0f1'; ctx.font = 'bold 13px sans-serif'; ctx.fillText(block.text, block.x, block.y); break;
        }
    }

    // 잔상 이펙트 드로우
    drawEffects();

    // 메인 캐릭터 드로우
    drawCharacter(player.x, player.y, player.width, player.height, player.facing);
}
