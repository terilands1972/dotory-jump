<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도토리의 파쿠르 대모험 (6스테이지 완벽 수정판)</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #34495e;
            display: block;
            border: 4px solid #ecf0f1;
            border-radius: 8px;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #bdc3c7;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>🐿️ 도토리의 파쿠르 대모험 🌳</h1>
    <div id="game-container">
        <div id="ui">Stage: <span id="stage-num">1</span>/10 | Deaths: <span id="death-num">0</span></div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
    <div id="instructions">
        <strong>조작법:</strong> 좌우 방향키(←, →) 또는 A, D - 이동 | 위 방향키(↑) 또는 W, Space - 점프
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let currentStage = 1;
let deaths = 0;

// 점프 감각을 조금 더 가볍고 경쾌하게 상향 조정
const player = {
    x: 50,
    y: 350,
    width: 24, 
    height: 36,
    vx: 0,
    vy: 0,
    speed: 5,         // 기본 이동 속도 살짝 상향 (4.5 -> 5)
    jumpForce: 12.5,   // 기본 점프력 확실하게 상향 (11.5 -> 12.5)
    baseSpeed: 5,
    baseJump: 12.5,
    grounded: false,
    facing: 1
};

const gravity = 0.48;
const friction = 0.85;

const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// --- 모든 구간 피드백 반영 및 좌표 검증 완료 ---
const stages = {
    1: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 800, h: 50, type: 1},
            {x: 300, y: 350, w: 120, h: 100, type: 1},
            {x: 520, y: 250, w: 120, h: 200, type: 1},
            {x: 730, y: 150, w: 50, h: 300, type: 6},
            {x: 50, y: 300, type: 7, text: "기본 이동: 방향키 또는 WASD / Space"},
            {x: 720, y: 110, type: 7, text: "GOAL!"}
        ]
    },
    2: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 200, h: 50, type: 1},
            {x: 200, y: 450, w: 150, h: 50, type: 2}, 
            {x: 350, y: 450, w: 450, h: 50, type: 1},
            {x: 730, y: 350, w: 50, h: 100, type: 6},
            {x: 210, y: 380, type: 7, text: "⚠️ 가시 블록: 닿으면 즉사! 뛰어넘으세요."}
        ]
    },
    3: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 150, h: 50, type: 1},
            {x: 200, y: 450, w: 80, h: 50, type: 3}, 
            {x: 380, y: 230, w: 150, h: 270, type: 1}, 
            {x: 650, y: 150, w: 120, h: 350, type: 1},
            {x: 700, y: 50, w: 50, h: 100, type: 6},
            {x: 180, y: 380, type: 7, text: "🚀 점프대: 밟으면 엄청 높게 점프합니다!"}
        ]
    },
    4: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 150, h: 50, type: 1},
            {x: 150, y: 450, w: 200, h: 50, type: 4}, 
            {x: 350, y: 450, w: 200, h: 50, type: 2}, 
            {x: 550, y: 400, w: 250, h: 100, type: 1},
            {x: 730, y: 300, w: 50, h: 100, type: 6},
            {x: 160, y: 380, type: 7, text: "⚡ 스피드 블록: 가속도를 얻어 가시를 뛰어넘으세요!"}
        ]
    },
    5: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 150, h: 50, type: 1},
            {x: 150, y: 450, w: 300, h: 50, type: 5}, 
            {x: 280, y: 380, w: 40, h: 70, type: 1},  
            {x: 520, y: 320, w: 100, h: 180, type: 1},
            {x: 680, y: 220, w: 120, h: 280, type: 1},
            {x: 730, y: 120, w: 50, h: 100, type: 6},
            {x: 160, y: 410, type: 7, text: "❄️ 슬로우 블록: 느려지니 중간 발판을 디디세요."}
        ]
    },
    6: { // ★★★ 6스테이지 전면 전수 수정 완료 ★★★
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 120, h: 50, type: 1},
            {x: 200, y: 360, w: 80, h: 20, type: 1},  // 간격 좁힘
            {x: 340, y: 290, w: 60, h: 20, type: 2},  // 페이크 가시 위치 하향 및 너비 축소
            {x: 460, y: 240, w: 80, h: 20, type: 1},  // 2번 발판에서 점프로 쉽게 도달 가능하게 수정
            {x: 620, y: 180, w: 180, h: 320, type: 1},
            {x: 720, y: 80, w: 50, h: 100, type: 6},
            {x: 150, y: 200, type: 7, text: "가운데 빨간 발판은 가시 함정입니다! 대시 점프로 한 번에 넘어가세요."}
        ]
    },
    7: {
        playerStart: {x: 50, y: 100},
        blocks: [
            {x: 0, y: 180, w: 120, h: 20, type: 1},
            {x: 180, y: 260, w: 80, h: 20, type: 3}, 
            {x: 320, y: 460, w: 480, h: 40, type: 2}, 
            {x: 420, y: 200, w: 120, h: 20, type: 4}, 
            {x: 650, y: 250, w: 150, h: 250, type: 1},
            {x: 730, y: 150, w: 50, h: 100, type: 6},
            {x: 350, y: 420, type: 7, text: "바닥에 떨어지면 즉사입니다! 공중 콤보!"}
        ]
    },
    8: {
        playerStart: {x: 50, y: 350},
        blocks: [
            {x: 0, y: 450, w: 100, h: 50, type: 1},
            {x: 160, y: 390, w: 60, h: 60, type: 5}, 
            {x: 280, y: 320, w: 60, h: 130, type: 4}, 
            {x: 420, y: 240, w: 60, h: 210, type: 3}, 
            {x: 580, y: 180, w: 100, h: 20, type: 1},
            {x: 720, y: 180, w: 80, h: 320, type: 1},
            {x: 740, y: 80, w: 50, h: 100, type: 6},
            {x: 150, y: 120, type: 7, text: "종합 선물 세트! 슬로우 -> 스피드 -> 점프 순서대로 뛰어넘으세요."}
        ]
    },
    9: {
        playerStart: {x: 40, y: 350},
        blocks: [
            {x: 0, y: 450, w: 100, h: 50, type: 1},
            {x: 160, y: 320, w: 30, h: 180, type: 2}, 
            {x: 250, y: 450, w: 80, h: 50, type: 3},  
            {x: 420, y: 200, w: 30, h: 300, type: 2}, 
            {x: 510, y: 300, w: 100, h: 20, type: 5},
            {x: 680, y: 200, w: 120, h: 300, type: 1},
            {x: 730, y: 100, w: 50, h: 100, type: 6},
            {x: 210, y: 120, type: 7, text: "점프대를 강하게 밟아 중앙 가시벽을 넘어가세요!"}
        ]
    },
    10: {
        playerStart: {x: 40, y: 350},
        blocks: [
            {x: 0, y: 450, w: 100, h: 50, type: 1},
            {x: 100, y: 480, w: 580, h: 20, type: 2}, 
            {x: 160, y: 360, w: 50, h: 20, type: 4}, 
            {x: 290, y: 280, w: 50, h: 20, type: 3}, 
            {x: 440, y: 220, w: 50, h: 20, type: 5}, 
            {x: 570, y: 260, w: 50, h: 20, type: 3}, 
            {x: 680, y: 400, w: 120, h: 100, type: 1},
            {x: 730, y: 300, w: 50, h: 100, type: 6},
            {x: 280, y: 80, type: 7, text: "🔥 FINAL STAGE: 멈추지 말고 타이밍에 맞춰 리드미컬하게 공중 점프!"}
        ]
    }
};

function resetPlayer() {
    const stage = stages[currentStage];
    player.x = stage.playerStart.x;
    player.y = stage.playerStart.y;
    player.vx = 0;
    player.vy = 0;
    player.speed = player.baseSpeed;
    player.jumpForce = player.baseJump;
    player.grounded = false;
}

function drawAcorn(x, y, width, height, facing) {
    ctx.save();
    ctx.translate(x + width/2, y + height/2);
    ctx.scale(facing, 1);

    const w = width;
    const h = height;

    // 1. 도토리 깍지 (모자)
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(-w/2 + 2, -h/2 + 4, w - 4, 8);
    ctx.fillRect(-2, -h/2, 4, 4); 

    // 2. 도토리 알맹이
    ctx.fillStyle = '#a1887f';
    ctx.beginPath();
    ctx.moveTo(-w/2 + 2, -h/2 + 12);
    ctx.lineTo(w/2 - 2, -h/2 + 12);
    ctx.lineTo(w/2 - 4, -h/2 + 22);
    ctx.lineTo(0, -h/2 + 28); 
    ctx.lineTo(-w/2 + 4, -h/2 + 22);
    ctx.closePath();
    ctx.fill();

    // 3. 눈과 입 (표정)
    ctx.fillStyle = '#000000';
    ctx.fillRect(3, -h/2 + 14, 2, 2); 
    ctx.fillRect(-5, -h/2 + 14, 2, 2); 
    ctx.fillStyle = '#e57373'; 
    ctx.fillRect(5, -h/2 + 17, 2, 2);

    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-1, -h/2 + 19);
    ctx.quadraticCurveTo(1, -h/2 + 21, 3, -h/2 + 19);
    ctx.stroke();

    // 4. 졸라맨 팔다리
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    const bodyBottomY = -h/2 + 24;

    ctx.beginPath();
    ctx.moveTo(-w/4, bodyBottomY - 4);
    ctx.lineTo(-w/2 - 3, bodyBottomY + 2);
    ctx.moveTo(w/4, bodyBottomY - 4);
    ctx.lineTo(w/2 + 3, bodyBottomY + 2);
    ctx.stroke();

    ctx.beginPath();
    if (Math.abs(player.vx) > 0.5 && player.grounded) {
        const walkCycle = Math.sin(Date.now() * 0.015) * 5;
        ctx.moveTo(-3, bodyBottomY);
        ctx.lineTo(-5 + walkCycle, h/2);
        ctx.moveTo(3, bodyBottomY);
        ctx.lineTo(5 - walkCycle, h/2);
    } else {
        ctx.moveTo(-3, bodyBottomY);
        ctx.lineTo(-5, h/2);
        ctx.moveTo(3, bodyBottomY);
        ctx.lineTo(5, h/2);
    }
    ctx.stroke();

    ctx.restore();
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.w &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.h &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.vx = player.speed;
        player.facing = 1;
    } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.vx = -player.speed;
        player.facing = -1;
    } else {
        player.vx *= friction;
    }

    if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    player.vy += gravity;

    player.speed = player.baseSpeed;
    player.jumpForce = player.baseJump;

    // X축 이동 및 충돌
    player.x += player.vx;
    const stage = stages[currentStage];
    
    for (let block of stage.blocks) {
        if (block.type === 7) continue;
        if (checkCollision(player, block)) {
            if (block.type === 2) { handleDeath(); return; }
            if (block.type === 6) { nextStage(); return; }
            if (player.vx > 0) player.x = block.x - player.width;
            if (player.vx < 0) player.x = block.x + block.w;
        }
    }

    // Y축 이동 및 충돌
    player.y += player.vy;
    player.grounded = false;

    for (let block of stage.blocks) {
        if (block.type === 7) continue;
        if (checkCollision(player, block)) {
            if (block.type === 2) { handleDeath(); return; }
            if (block.type === 6) { nextStage(); return; }
            
            if (player.vy > 0) { 
                player.y = block.y - player.height;
                player.vy = 0;
                player.grounded = true;

                if (block.type === 3) { 
                    player.vy = -player.baseJump * 1.55; 
                    player.grounded = false;
                }
                if (block.type === 4) { 
                    player.speed = player.baseSpeed * 1.8; 
                }
                if (block.type === 5) { 
                    player.speed = player.baseSpeed * 0.45; 
                }
            } else if (player.vy < 0) { 
                player.y = block.y + block.h;
                player.vy = 0;
            }
        }
    }

    if (player.y > canvas.height) {
        handleDeath();
    }
}

function handleDeath() {
    deaths++;
    document.getElementById('death-num').innerText = deaths;
    resetPlayer();
}

function nextStage() {
    currentStage++;
    if (currentStage > 10) {
        alert(`🎉 대성공! 도토리가 집을 찾았습니다!\n총 데스 수: ${deaths}`);
        currentStage = 1;
        deaths = 0;
        document.getElementById('death-num').innerText = deaths;
    }
    document.getElementById('stage-num').innerText = currentStage;
    resetPlayer();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const stage = stages[currentStage];

    for (let block of stage.blocks) {
        switch(block.type) {
            case 1:
                ctx.fillStyle = '#8d6e63';
                ctx.fillRect(block.x, block.y, block.w, block.h);
                ctx.strokeStyle = '#5d4037';
                ctx.strokeRect(block.x, block.y, block.w, block.h);
                break;
            case 2:
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                for (let i = block.x; i < block.x + block.w; i += 10) {
                    ctx.moveTo(i, block.y + block.h);
                    ctx.lineTo(i + 5, block.y);
                    ctx.lineTo(i + 10, block.y + block.h);
                }
                ctx.fill();
                break;
            case 3:
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(block.x, block.y, block.w, block.h);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(block.x, block.y, block.w, 6);
                break;
            case 4:
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(block.x, block.y, block.w, block.h);
                ctx.fillStyle = '#d68910';
                ctx.font = '10px sans-serif';
                for(let k = block.x + 2; k < block.x + block.w; k += 20) {
                    ctx.fillText(">>", k, block.y + 14);
                }
                break;
            case 5:
                ctx.fillStyle = '#9b59b6';
                ctx.fillRect(block.x, block.y, block.w, block.h);
                ctx.fillStyle = '#7d3c98';
                ctx.fillRect(block.x, block.y, block.w, 4);
                break;
            case 6:
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(block.x, block.y, block.w, block.h);
                ctx.strokeStyle = '#ffffff';
                ctx.strokeRect(block.x + 4, block.y + 4, block.w - 8, block.h - 4);
                break;
            case 7:
                ctx.fillStyle = '#ecf0f1';
                ctx.font = 'bold 13px sans-serif';
                ctx.fillText(block.text, block.x, block.y);
                break;
        }
    }

    drawAcorn(player.x, player.y, player.width, player.height, player.facing);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

resetPlayer();
gameLoop();
</script>

</body>
</html>
